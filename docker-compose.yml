name: "redis-chat"
services:
  redis:
    container_name: redis
    image: "redis:alpine"
    ports:
      - 6379:6379
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    volumes:
      - redis-data:/data

  agent-memory-server:
    container_name: agent-memory-server
    image: redislabs/agent-memory-server
    ports:
      - 8000:8000
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - DISABLE_AUTH=${DISABLE_AUTH:-true}
      - LONG_TERM_MEMORY=${LONG_TERM_MEMORY:-true}
      - ENABLE_DISCRETE_MEMORY_EXTRACTION=${ENABLE_DISCRETE_MEMORY_EXTRACTION:-true}
      - GENERATION_MODEL=${GENERATION_MODEL:-gpt-5.2-chat-latest}
      - FAST_MODEL=${FAST_MODEL:-gpt-5-mini}
    depends_on:
      - redis

  server:
    container_name: server
    build: .
    ports:
      - 8080:8080
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - REDIS_DEFAULT_TTL=${REDIS_DEFAULT_TTL:-86400}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - AGENT_MEMORY_URL=${AGENT_MEMORY_URL:-http://agent-memory-server:8000}
    restart: unless-stopped
    depends_on:
      - redis
      - agent-memory-server

volumes:
  redis-data:
